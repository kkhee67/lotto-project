<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Lotto Project</title>

    <style>

        body {
            font-family: Arial;
            text-align: center;
            margin-top: 100px;
            background-color: #f4f4f4;
        }

        .box {
            background: white;
            width: 600px;
            margin: auto;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h1 {
            color: #2c3e50;
        }

        .numbers {
            margin: 30px 0;
        }

        .ball {
            display: inline-block;
            width: 60px;
            height: 60px;
            line-height: 60px;
            border-radius: 50%;
            background-color: orange;
            color: white;
            font-size: 24px;
            font-weight: bold;
            margin: 10px;
        }

        button {
            padding: 12px 25px;
            background: green;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
        }

        button:hover {
            background: darkgreen;
        }

    </style>
</head>

<body>

<div class="box">

    <h1>6/45 Lotto Web Site</h1>

    <p>Django + Docker Lotto Project</p>

    <div class="numbers">

        <form method="POST">

    {% csrf_token %}

    <input type="text"
           name="manual_numbers"
           placeholder="예: 1 5 11 23 34 41"
           style="padding:10px; width:300px;">

    <br><br>

    <button type="submit">
        수동 번호 구매
    </button>

</form>

<br>

        {% for number in numbers %}
            <span class="ball">
                {{ number }}
            </span>
        {% endfor %}

    </div>

    <button onclick="window.location.href='/'">
    자동 번호 구매
</button>

    <br><br>

<a href="/history/">
    구매 내역 보기
</a>

</div>

</body>
</html>
