version: '3'

services:

  web:
    build: .

    command: python manage.py runserver 0.0.0.0:8000

    volumes:
      - .:/app

    ports:
      - "8000:8000"

    depends_on:
      - db

  db:
    image: postgres:15

    environment:
      POSTGRES_DB: lotto_db
      POSTGRES_USER: lotto_user
      POSTGRES_PASSWORD: lotto_pass

    ports:
      - "5432:5432"

  nginx:
    image: nginx:latest

    ports:
      - "80:80"

    depends_on:
      - web